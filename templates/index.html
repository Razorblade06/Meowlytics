<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meowlytics - Cat Sound Analyzer</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <div class="row justify-content-center mt-5">
            <div class="col-md-8">
                <div class="card shadow">
                    <div class="card-body text-center">
                        <h1 class="site-title mb-4">🐱 Meowlytics</h1>
                        <p class="lead mb-4">Upload a cat sound to analyze its meaning</p>
                        
                        <form id="uploadForm" class="mb-4">
                            <div class="drop-zone mb-4" id="dropZone">
                                <button type="button" class="clear-button" id="clearButton">×</button>
                                <span class="drop-zone__prompt">Drop file here or click to upload</span>
                                <input type="file" name="file" class="drop-zone__input" accept=".wav,.mp3,.ogg">
                            </div>
                            <button type="submit" class="btn btn-primary btn-lg" id="analyzeBtn">
                                Analyze Sound
                            </button>
                        </form>

                        <div id="loading" class="d-none">
                            <div class="spinner-border text-primary" role="status">
                                <span class="visually-hidden">Loading...</span>
                            </div>
                            <p class="mt-2">Analyzing your cat's sound...</p>
                        </div>

                        <div id="result" class="d-none">
                            <div class="alert alert-success">
                                <h4 class="result-text"></h4>
                                <p class="confidence-text"></p>
                            </div>
                        </div>

                        <div id="error" class="d-none">
                            <div class="alert alert-danger">
                                <p class="error-text"></p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
